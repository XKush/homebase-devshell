name: Install or doctor help
description: Something failed during install or devshell doctor
title: "[install] "
labels: ["install", "question"]
body:
  - type: markdown
    attributes:
      value: |
        See [Troubleshooting](https://github.com/XKush/homebase-devshell/blob/main/docs/TROUBLESHOOTING.md) first.
  - type: textarea
    id: steps
    attributes:
      label: What did you run?
      placeholder: Paste the install line or doctor command
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: What happened?
      description: Error message or last lines of output (no secrets)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: e.g. Windows 11 24H2
    validations:
      required: true
  - type: input
    id: pwsh
    attributes:
      label: PowerShell version
      placeholder: output of $PSVersionTable.PSVersion
    validations:
      required: true
