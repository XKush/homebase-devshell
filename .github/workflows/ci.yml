name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  WORKSTATION_ROOT: ${{ github.workspace }}
  HOMEBASE_DEVSHELL_ROOT: ${{ github.workspace }}

jobs:
  release-version:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Test-ReleaseVersion
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            pwsh -NoProfile -File scripts/maintainer/test/Test-ReleaseVersion.ps1 -RequireTagAtHead
          } else {
            pwsh -NoProfile -File scripts/maintainer/test/Test-ReleaseVersion.ps1 -SkipGit
          }

  command-health:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test-WorkstationCommands -Quick
        shell: pwsh
        run: |
          pwsh -NoProfile -File scripts/maintainer/test/Test-WorkstationCommands.ps1 -Quick

  platform-hardening:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test-WorkstationPlatformHardening
        shell: pwsh
        run: |
          pwsh -NoProfile -File scripts/maintainer/test/Test-WorkstationPlatformHardening.ps1

  install-smoke:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Smoke install.ps1 in temp dir
        shell: pwsh
        env:
          CI: '1'
        run: |
          $src = Get-Location
          $temp = Join-Path $env:RUNNER_TEMP "devshell-smoke"
          if (Test-Path $temp) { Remove-Item $temp -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $temp | Out-Null
          Copy-Item -Path $src -Destination $temp -Recurse -Force
          $work = Join-Path $temp (Split-Path $src -Leaf)
          Push-Location $work
          try {
            $env:WORKSTATION_ROOT = $work
            $env:HOMEBASE_DEVSHELL_ROOT = $work
            pwsh -NoProfile -File install.ps1 -SkipTools -SkipDoctor
            if ($LASTEXITCODE -ne 0) { throw "install.ps1 exited $LASTEXITCODE" }
          } finally {
            Pop-Location
          }
