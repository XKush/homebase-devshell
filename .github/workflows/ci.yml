name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  WORKSTATION_ROOT: ${{ github.workspace }}
  HOMEBASE_DEVSHELL_ROOT: ${{ github.workspace }}

jobs:
  release-version:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Test-ReleaseVersion
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            pwsh -NoProfile -File scripts/maintainer/test/Test-ReleaseVersion.ps1 -RequireTagAtHead
          } else {
            pwsh -NoProfile -File scripts/maintainer/test/Test-ReleaseVersion.ps1 -SkipGit
          }

  command-health:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test-WorkstationCommands -Quick
        shell: pwsh
        run: |
          pwsh -NoProfile -File scripts/maintainer/test/Test-WorkstationCommands.ps1 -Quick

  platform-hardening:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test-WorkstationPlatformHardening
        shell: pwsh
        run: |
          pwsh -NoProfile -File scripts/maintainer/test/Test-WorkstationPlatformHardening.ps1

  install-smoke:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Smoke install.ps1 in temp dir
        shell: pwsh
        env:
          CI: '1'
        run: |
          $src = Get-Location
          $temp = Join-Path $env:RUNNER_TEMP "devshell-smoke"
          if (Test-Path $temp) { Remove-Item $temp -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $temp | Out-Null
          Copy-Item -Path $src -Destination $temp -Recurse -Force
          $work = Join-Path $temp (Split-Path $src -Leaf)
          Push-Location $work
          try {
            $env:WORKSTATION_ROOT = $work
            $env:HOMEBASE_DEVSHELL_ROOT = $work
            pwsh -NoProfile -File install.ps1 -SkipTools -SkipDoctor
            if ($LASTEXITCODE -ne 0) { throw "install.ps1 exited $LASTEXITCODE" }
          } finally {
            Pop-Location
          }

  init-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: devshell init dry-run
        shell: pwsh
        run: |
          $out = pwsh -NoProfile -File devshell.ps1 init 2>&1 | Out-String
          Write-Host $out
          if ($out -notmatch 'DRY-RUN') { throw 'init output missing DRY-RUN marker' }
          if ($out -notmatch 'Nothing was installed') { throw 'init should not install' }

  privacy-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Privacy audit smoke (offline)
        shell: pwsh
        run: |
          pwsh -NoProfile -File scripts/maintainer/test/Test-PrivacyAuditSmoke.ps1

  doctor-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Doctor Core smoke
        shell: pwsh
        run: |
          pwsh -NoProfile -File scripts/maintainer/test/Test-DoctorSmoke.ps1

  health-smoke:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Health dashboard smoke
        shell: pwsh
        run: |
          $out = pwsh -NoProfile -File devshell.ps1 health -Json 2>&1 | Out-String
          if ($out -notmatch 'healthSchemaVersion') { throw 'health -Json missing schema' }
          if ($out -notmatch 'Ready to work|Not ready yet') { throw 'health missing summary' }

  release-assets:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release-version, command-health, platform-hardening, install-smoke, init-smoke, privacy-smoke, doctor-smoke, health-smoke]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build zip + SHA256
        shell: pwsh
        run: |
          $ver = $env:GITHUB_REF_NAME.TrimStart('v')
          pwsh -NoProfile -File scripts/maintainer/invoke/Build-DevReadyRelease.ps1 -Version $ver
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/devready-*.zip
            dist/devready-*.sha256.txt
